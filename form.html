<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RankingTeen</title>
    <link rel="shortcut icon" href="src/assets/favicon_io/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="src/css/variables.css">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/logotipos.css">
    <link rel="stylesheet" href="src/css/form.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="container-logo-rankingTeen">
                <img src="src/assets/img/rankingteen.svg" alt="" class="logo-rankingTeen">
            </div>
        </div>
    </header>
    <main>
        <div class="main-content">
            <label> Quantidade de alunos presentes
                <input type="number" class="checkbox-number" placeholder="0" min="0">
            </label>
            <label> Quantidade que estudou a lição
                <input type="number" class="checkbox-number" placeholder="0" min="0">
            </label>
            <label> A recapitulação foi dividida?
                <input type="checkbox" class="checkbox">
            </label>
            <label> Quantidade de visitantes na salinha
                <input type="number" class="checkbox-number" placeholder="0" min="0">
            </label>
            <label> Quantidade de estudos bíblicos iniciados
                <input type="number" class="checkbox-number" placeholder="0" min="0">
            </label>
            <input type="button" value="Copiar formulário para enviar" id="button-copyForm">
        </div>
    </main>
    <footer>
        <div class="footer-content">
            <div class="container-logo-IASD">
                <img src="src/assets/img/iasd.svg" alt="IASD" class="logo-IASD">
            </div>
        </div>
    </footer>
    <!-- <script type="module" src="src/js/main.js"></script> -->
</body>
</html>


<!--
1- Quantidade de alunos presentes
2- quantos membros estudaram a lição ou se todos estudaram

3- Recapitulação dividida entre os membros sim ou não 

4-Visita em casa de alguém sim ou não 

5-Alguém visitou a salinha?

6-Um estudo bíblico foi iniciado?

7-Participação no programa do final do trimestre?

8-(Organização de almoço para visitantes)
Almoço realizado?
Por visitante presente?




🏆 DESAFIO ESCOLA SABATINA VIVA 🏆

📅 1. PONTUAÇÃO SEMANAL
(Contabilizado todo sábado)

📍 Presença:
+1 pt por pessoa presente.
BÔNUS: +20 pts para a classe com maior presença.

📖 Estudo da Lição:
+1 pt por membro que estudou.
BÔNUS: +30 pts se TODOS estudarem.

👥 Envolvimento:
✅ +10 pts: Recapitulação dividida entre os membros.
❌ -20 pts: Se apenas o professor falar.

🚀 2. AÇÃO MISSIONÁRIA (ESSENCIAL)
🏠 Visita missionária: +10 pts
🤝 Levar visitante: +15 pts
📖 Iniciar estudo bíblico: +20 pts

✨ 3. EVENTOS ESPECIAIS (NO TRIMESTRE)
🎤 Escola Sabatina Especial:
(Programa com louvor, dinâmica, testemunho e oração)
Participação da classe toda: +20 pts
Criatividade: +10 pts
Impacto espiritual: +20 pts

🍽️ Recepcionando Amigos:
(Organização de almoço para visitantes)
Almoço realizado: +20 pts
Por visitante presente: +10 pts

❓ Quiz Bíblico:
(No último sábado do trimestre)
Cada resposta correta: +10 pts

🎁 IDEIAS DE PREMIAÇÃO FINAL
- Classe Destaque
- Troféu
- Recompensa Especial (Jantar, passeio ou confraternização).

O objetivo é fortalecer a comunhão, o estudo e a missão.
-->
